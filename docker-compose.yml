networks:
  ecom:
    driver: bridge
    name: ecom

services:
  mongodb:
    image: mohan9866007322/mongodb:v1
    container_name: mongodb
  catalogue:
    image: mohan9866007322/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  redis:
    image: redis:7.0
    container_name: redis
  user:
    image: mohan9866007322/user:v1
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    image: mohan9866007322/cart:v1
    container_name: cart
    depends_on:
      - catalogue
      - redis
  mysql:
    image: mohan9866007322/mysql:v1
    container_name: mysql
  shipping:
    image: mohan9866007322/shipping:v1
    container_name: shipping
    depends_on:
      - cart
      - mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ecom
      RABBITMQ_DEFAULT_PASS: ecom123
  payment:
    image: mohan9866007322/payment:v1
    environment:
      CART_HOST:cart
      CART_PORT:8080
      USER_HOST:user
      USER_PORT:8080
      AMQP_HOST:rabbitmq
      AMQP_USER:ecom
      AAMQP_PASS:ecom123
    depends_on:
      - cart
      - user
  frontend:
    image: mohan9866007322/frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping